<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог о крокодилах</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-username="{{ session.username if session.username else '' }}">
    <div class="header">
        <div class="header-content">
            <h1>Блог о крокодилах</h1>
            {% if session.username %}
            <div class="user-info">
                <span>Привет, {{ session.username }}!</span>
                <a href="{{ url_for('logout') }}" class="btn-logout">Выйти</a>
            </div>
            {% endif %}
        </div>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
